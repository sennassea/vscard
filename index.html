<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조서현 | 웹명함</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="business-card">
    <div class="profile-wrap">
      <img src="프로필1.jpg" alt="조서현 프로필 이미지" class="profile-img" />
    </div>

    <h1>조서현</h1>
    <p class="job">개발PM</p>

    <p class="intro">
      문제를 빠르게 파악하고 해결까지 이끌어내는 PM입니다.
    </p>

    <div class="tags">
      <span>#역량1</span>
      <span>#역량2</span>
      <span>#역량3</span>
    </div>

    <section class="info-list">
      <button class="info-box copy-btn" data-copy="seohyun@example.com">
        <span class="icon">✉</span>
        <span class="text-area">
          <span class="label">이메일</span>
          <span class="value">seohyun@example.com</span>
        </span>
      </button>

      <button class="info-box copy-btn" data-copy="010-1234-5678">
        <span class="icon">☎</span>
        <span class="text-area">
          <span class="label">전화번호</span>
          <span class="value">010-1234-5678</span>
        </span>
      </button>

      <a class="info-box" href="https://github.com/sennassea" target="_blank">
        <span class="icon">⌘</span>
        <span class="text-area">
          <span class="label">링크</span>
          <span class="value">Github</span>
        </span>
      </a>

      <button class="info-box" type="button">
        <span class="icon">◈</span>
        <span class="text-area">
          <span class="label">링크</span>
          <span class="value">Portfolio</span>
        </span>
      </button>
    </section>

    <p id="copyMessage" class="copy-message">복사되었습니다.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
