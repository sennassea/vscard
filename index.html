<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조서현 | 웹 명함</title>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>
  <div class="business-card">

    <div class="profile-image">
      <img src="프로필1.jpg" alt="조서현 프로필 사진">
    </div>

    <h1 class="name">조서현</h1>

    <p class="job-title">개발PM</p>

    <div class="contact-list">

      <div class="contact-item">
        <div class="icon email-icon">✉</div>

        <div class="contact-info">
          <div class="contact-label">이메일</div>

          <div class="contact-value">
            <a href="mailto:seohyun@example.com">
              seohyun@example.com
            </a>
          </div>
        </div>
      </div>

      <div class="contact-item">
        <div class="icon phone-icon">☎</div>

        <div class="contact-info">
          <div class="contact-label">전화번호</div>

          <div class="contact-value">
            <a href="tel:01012345678">
              010-1234-5678
            </a>
          </div>
        </div>
      </div>

    </div>

  </div>
</body>
</html>
